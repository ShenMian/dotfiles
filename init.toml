[options]
    # 设置 SpaceVim 主题及背景，默认的主题是 gruvbox，如果你需要使用更
    # 多的主题，你可以载入 colorscheme 模块
    colorscheme = "gruvbox"
    # colorscheme = "one"
    # 背景可以取值 "dark" 或 "light"
    colorscheme_bg = "dark"
    # 启用/禁用终端真色，在目前大多数终端下都是支持真色的，当然也有
    # 一小部分终端不支持真色，如果你的 SpaceVim 颜色看上去比较怪异
    # 可以禁用终端真色，将下面的值设为 false
    enable_guicolors = true
    # 设置状态栏上分割符号形状，如果字体安装失败，可以将值设为 "nil" 以
    # 禁用分割符号，默认为箭头 "arrow"
    statusline_separator = "arrow"
    statusline_iseparator = "bar"
    # 设置顶部标签列表序号类型，有以下五种类型，分别是 0 - 4
    # 0: 1 ➛ ➊
    # 1: 1 ➛ ➀
    # 2: 1 ➛ ⓵
    # 3: 1 ➛ ¹
    # 4: 1 ➛ 1
    buffer_index_type = 4
    # 显示/隐藏顶部标签栏上的文件类型图标，这一图标需要安装 nerd fonts，
    # 如果未能成功安装这一字体，可以隐藏图标
    enable_tabline_filetype_icon = true
    # 是否在状态栏上显示当前模式，默认情况下，不显示 Normal/Insert 等
    # 字样，只以颜色区分当前模式
    enable_statusline_mode = false
    statusline_unicode = false
    # vimcompatible = true
    # 文件树是否显示 git 状态
    enable_filetree_gitstatus = true

#
# Plugins
#

# Autocomplete
[[layers]]
  name = 'autocomplete'
  auto_completion_return_key_behavior = "complete"
  auto_completion_tab_key_behavior = "smart"

[[layers]]
  name = 'shell'
  default_position = 'top'
  default_height = 30

# Github Copilot
[[custom_plugins]]
  repo = 'github/copilot.vim'
  merged = false

#
# Theme
#

[[custom_plugins]]
  repo = 'rakr/vim-one'
  merged = false

#
# Tools
#

# Fuzzy file finder
[[layers]]
  name = 'leaderf'

#
# Languages
#

# C/C++
[[layers]]
  name = 'lang#c'
  enable_clang_syntax_highlight = true
[[layers]]
  name = 'lsp'
  enabled_clients = ['clangd']
  filetypes = ["c", "cpp"]
  [layers.override_cmd]
    c = ["clangd"]

# Rust
[[layers]]
  name = "lang#rust"
[[layers]]
  name = "lsp"
  filetypes = ["rust"]
  [layers.override_cmd]
    rust = ["rls"]

