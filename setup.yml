---
- name : Setup
  hosts: localhost
  connection: local
  vars_files:
    - vars.yml

  tasks:
    - name: Setup Git
      git_config:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        scope: global
      loop: "{{ git_configs }}"

    - name: Install packages
      become: yes
      pacman:
        name: "{{ item }}"
        update_cache: yes
      loop: "{{ packages }}"

    - name: Install AUR packages
      kewlfft.aur.aur:
        name: "{{ item }}"
      become: yes
      become_user: "{{ lookup('env', 'USER') }}"
      loop: "{{ aur_packages }}"

    - name: Install Flatpak applications
      flatpak:
        name: "{{ item }}"
      loop: "{{ flatpak_applications }}"
