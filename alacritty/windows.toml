[window]
dimensions = { columns = 100, lines = 30 }
opacity = 0.9
dynamic_title = false

[font]
normal = { family = "Cascadia Code NF" }
size = 12.0

[terminal]
shell = { program = "pwsh.exe", args = [
    "-NoLogo",
    "-NoExit",
    "-Command Set-Location 'D:/Users/sms/Desktop'",
] }

[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001B\r"
